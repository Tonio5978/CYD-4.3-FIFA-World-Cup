; FIFA World Cup 2026 - Sunton ESP32-8048S043C
; PlatformIO configuration

[env:sunton-esp32-8048s043c]
; Espressif32 6.x = Arduino-ESP32 2.0.17 — support PSRAM OPI fiable sur ESP32-S3
platform = espressif32@^6.4.0
; esp32s3box : ESP32-S3 + 16 MB Flash QIO + 8 MB PSRAM OPI — même config que le Sunton
board = esp32s3box
framework = arduino

board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
; Drapeaux stockes en Flash interne (partition spiffs 3,4 Mo) via LittleFS.
; Televerser l'image avec :  pio run --target uploadfs
board_build.filesystem = littlefs

; Active la PSRAM OPI 8 MB du Sunton ESP32-8048S043C.
board_build.arduino.memory_type = qio_opi

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    ; GPIO19/GPIO20 = I2C touch GT911 → USB-OTG impossible sur ces pins.
    ; Forcer UART0 (GPIO43=TX / GPIO44=RX) pour Serial → visible via USB-JTAG.
    ; Le board esp32s3box active USB-CDC par défaut dans son variant.h ;
    ; ces deux flags à 0 l'écrasent explicitement.
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DCONFIG_ARDUHAL_LOG_COLORS=1

lib_deps =
    lovyan03/LovyanGFX@^1.1.16
    bblanchon/ArduinoJson@^7.0.4
    bitbank2/PNGdec@^1.0.1

monitor_speed = 115200
monitor_filters = esp32_exception_decoder, colorize
upload_speed = 921600
